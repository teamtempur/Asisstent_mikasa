# Tox configuration untuk Bot Telegram Claim TukTuk
# Usage: tox
# Testing di multiple Python versions

[tox]
envlist = py38, py39, py310, py311, flake8, mypy
isolated_build = true

[testenv]
deps =
    pytest>=7.0.0
    pytest-asyncio>=0.20.0
    pytest-cov>=4.0.0
commands =
    pytest {posargs}

[testenv:flake8]
deps = flake8>=5.0.0
commands = flake8 bot.py config.py google_sheets.py utils.py

[testenv:mypy]
deps =
    mypy>=0.990
    types-python-dateutil
commands = mypy bot.py config.py google_sheets.py utils.py

[testenv:black]
deps = black>=22.0.0
commands = black --check --diff bot.py config.py google_sheets.py utils.py

[testenv:format]
deps = black>=22.0.0
commands = black bot.py config.py google_sheets.py utils.py

[testenv:lint]
deps =
    flake8>=5.0.0
    black>=22.0.0
    isort>=5.12.0
commands =
    flake8 bot.py config.py google_sheets.py utils.py
    black --check bot.py config.py google_sheets.py utils.py
    isort --check-only bot.py config.py google_sheets.py utils.py

[testenv:docs]
deps =
    mkdocs>=1.4.0
commands =
    mkdocs build

[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    venv,
    .tox
ignore = E203, W503

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
